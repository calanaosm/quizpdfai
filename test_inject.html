<!DOCTYPE html>
<html>
<head><title>Inject Quiz State</title></head>
<body>
  <script>
    const sampleQuiz = {
      questions: [
        {
          text: "What is 2 + 2?",
          choices: ["3", "4", "5", "6"],
          correct: 1,
          confidence: 0.99,
          explanation: "Math."
        },
        {
          text: "What is the capital of France?",
          choices: ["London", "Berlin", "Paris", "Madrid"],
          correct: 2,
          confidence: 0.99,
          explanation: "Geography."
        }
      ],
      sourceFile: "test.pdf",
      pageCount: 1,
      wordCount: 10,
      chunksUsed: 1,
      generatedAt: Date.now()
    };
    localStorage.setItem('quizpdfai_generated_quiz', JSON.stringify(sampleQuiz));
    localStorage.setItem('quizpdfai_active_quiz', JSON.stringify(sampleQuiz));
    window.location.href = '/#quiz';
  </script>
</body>
</html>
